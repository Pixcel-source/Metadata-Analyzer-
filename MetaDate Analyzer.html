<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Forensics & Metadata Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #1a1d24;
            --bg-card: #252830;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #374151;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header { margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        h1 { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); }

        .controls { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }

        .file-upload-label {
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .file-upload-label:hover { background-color: var(--accent-hover); }
        input[type="file"] { display: none; }

        button#export-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button#export-btn:hover:not(:disabled) { background-color: var(--border); }
        button#export-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .preview-container {
            width: 100%;
            min-height: 200px;
            background-color: #111318;
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            overflow: hidden;
            position: relative;
        }

        #preview-image { max-width: 100%; max-height: 500px; display: none; object-fit: contain; }
        .placeholder-text { color: var(--text-secondary); font-style: italic; }

        .loading { display: none; color: var(--warning); font-weight: bold; margin: 1rem 0; text-align: center; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .result-card {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .result-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .result-card p { font-size: 1rem; font-weight: 500; word-break: break-word; white-space: pre-wrap; }
        .highlight { color: var(--accent); }
        .gps-link { color: var(--success); text-decoration: underline; cursor: pointer; font-size: 0.9rem; }

        .raw-data-section {
            background-color: #111318;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .raw-data-section h3 { margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; }

        pre#raw-json {
            background-color: #0d0f12;
            color: #a5b4fc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            max-height: 300px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔍 Image Forensics Analyzer</h1>
    </header>

    <div class="controls">
        <label for="file-input" class="file-upload-label">📁 Open Image</label>
        <input type="file" id="file-input" accept="image/jpeg, image/tiff, image/webp, image/png">
        <button id="export-btn" disabled>💾 Export Report</button>
    </div>

    <div class="preview-container">
        <span class="placeholder-text" id="placeholder">No image loaded</span>
        <img id="preview-image" alt="Preview">
    </div>

    <div id="loading-msg" class="loading">⏳ Analyzing Metadata...</div>

    <div class="results-grid">
        <div class="result-card">
            <h3>🛠️ Editing Software</h3>
            <p id="res-software">-</p>
        </div>
        <div class="result-card">
            <h3>📷 Camera/Device</h3>
            <p id="res-camera">-</p>
        </div>
        <div class="result-card">
            <h3>⏰ Date Taken</h3>
            <p id="res-date">-</p>
        </div>
        <div class="result-card">
            <h3>📍 GPS Location</h3>
            <p id="res-gps">-</p>
        </div>
    </div>

    <div class="raw-data-section">
        <h3>📋 Raw Metadata (JSON)</h3>
        <pre id="raw-json">Ready to analyze...</pre>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const fileInput   = document.getElementById('file-input');
    const previewImg  = document.getElementById('preview-image');
    const placeholder = document.getElementById('placeholder');
    const loadingMsg  = document.getElementById('loading-msg');
    const exportBtn   = document.getElementById('export-btn');
    const resSoftware = document.getElementById('res-software');
    const resCamera   = document.getElementById('res-camera');
    const resDate     = document.getElementById('res-date');
    const resGps      = document.getElementById('res-gps');
    const rawJson     = document.getElementById('raw-json');

    let currentMetadata = {};

    fileInput.addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;

        resetUI();
        loadingMsg.style.display = 'block';

        const objectURL = URL.createObjectURL(file);
        previewImg.src = objectURL;

        previewImg.onload = function () {
            placeholder.style.display = 'none';
            previewImg.style.display = 'block';

            if (typeof EXIF === 'undefined') {
                alert('EXIF library failed to load. Check your internet connection.');
                loadingMsg.style.display = 'none';
                return;
            }

            EXIF.getData(previewImg, function () {
                const allTags = EXIF.getAllTags(this);
                currentMetadata = allTags;
                analyzeData(allTags).then(() => {
                    loadingMsg.style.display = 'none';
                    exportBtn.disabled = false;
                });
            });
        };
    });

    function resetUI() {
        resSoftware.textContent = '-';
        resCamera.textContent   = '-';
        resDate.textContent     = '-';
        resGps.textContent      = '-';
        rawJson.textContent     = 'Analyzing...';
        exportBtn.disabled      = true;
    }

    async function analyzeData(tags) {
        // Software
        const software = detectEditingSoftware(tags);
        resSoftware.innerHTML = `<span class="highlight">${software}</span>`;

        // Camera
        const make  = (tags.Make  || '').trim();
        const model = (tags.Model || '').trim();
        resCamera.textContent = [make, model].filter(Boolean).join(' ') || 'Unknown Device';

        // Date
        resDate.textContent = tags.DateTimeOriginal || tags.DateTime || tags.CreateDate || 'Unknown Date';

        // GPS — fixed
        const gpsResult = await extractGPS(tags);
        resGps.innerHTML = gpsResult;

        // Raw JSON — filter out undefined/circular values safely
        try {
            rawJson.textContent = JSON.stringify(tags, (k, v) => {
                if (v instanceof Object && v.constructor && v.constructor.name === 'IFDTag') return undefined;
                return v;
            }, 2);
        } catch (e) {
            rawJson.textContent = 'Could not serialize metadata.';
        }
    }

    function detectEditingSoftware(tags) {
        const raw = (tags.Software || tags.CreatorTool || tags.Producer || tags.Application || '').toLowerCase();
        if (!raw) return 'No Software Metadata Found';

        const signatures = [
            { name: 'Adobe Photoshop',   pattern: /photoshop/ },
            { name: 'Adobe Lightroom',   pattern: /lightroom/ },
            { name: 'Adobe Illustrator', pattern: /illustrator/ },
            { name: 'GIMP',              pattern: /gimp/ },
            { name: 'Canva',             pattern: /canva/ },
            { name: 'Affinity Photo',    pattern: /affinity/ },
            { name: 'CorelDRAW',         pattern: /corel/ },
            { name: 'Paint.NET',         pattern: /paint\.net/ },
            { name: 'Microsoft Paint',   pattern: /mspaint/ },
            { name: 'iOS / iPhone',      pattern: /ios|iphone/ },
            { name: 'Android',           pattern: /android/ },
            { name: 'Snapseed',          pattern: /snapseed/ },
            { name: 'VSCO',              pattern: /vsco/ },
            { name: 'Blender',           pattern: /blender/ },
            { name: 'FFmpeg',            pattern: /ffmpeg/ },
        ];

        for (const sig of signatures) {
            if (sig.pattern.test(raw)) return sig.name;
        }

        return `Detected: ${tags.Software || tags.CreatorTool || 'Unknown'}`;
    }

    // ─── FIXED DMS → DD conversion ────────────────────────────────────────────
    function dmsToDecimal(dmsArray, ref) {
        if (!Array.isArray(dmsArray) || dmsArray.length < 3) return null;

        // EXIF.js returns each component as a fraction object {numerator, denominator}
        // OR as a plain number. Handle both.
        function toNum(v) {
            if (v === null || v === undefined) return 0;
            if (typeof v === 'number') return v;
            if (typeof v === 'object' && 'numerator' in v && 'denominator' in v) {
                return v.denominator !== 0 ? v.numerator / v.denominator : 0;
            }
            return parseFloat(v) || 0;
        }

        const deg = toNum(dmsArray[0]);
        const min = toNum(dmsArray[1]);
        const sec = toNum(dmsArray[2]);

        let dd = deg + min / 60 + sec / 3600;
        if (ref === 'S' || ref === 'W') dd = -dd;
        return dd;
    }

    // ─── Reverse geocode via Nominatim ────────────────────────────────────────
    async function reverseGeocode(lat, lon) {
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=14&addressdetails=1`;
        try {
            const res = await fetch(url, {
                headers: { 'Accept-Language': 'en', 'User-Agent': 'ImageForensicsTool/2.0' }
            });
            if (!res.ok) return null;
            const data = await res.json();
            if (!data || !data.address) return null;

            const a = data.address;
            // Build a clean, readable string — city, state, country
            const city    = a.city || a.town || a.village || a.hamlet || a.suburb || '';
            const state   = a.state || a.region || '';
            const country = a.country || '';

            return [city, state, country].filter(Boolean).join(', ') || data.display_name;
        } catch (err) {
            console.error('Geocoding error:', err);
            return null;
        }
    }

    // ─── Main GPS extractor ────────────────────────────────────────────────────
    async function extractGPS(tags) {
        const latArr = tags.GPSLatitude;
        const lonArr = tags.GPSLongitude;
        const latRef = tags.GPSLatitudeRef  || 'N';
        const lonRef = tags.GPSLongitudeRef || 'E';

        if (!latArr || !lonArr) {
            return tags.GPSInfoIFDPointer
                ? '⚠️ GPS pointer found but coordinates missing'
                : 'No GPS Data';
        }

        const lat = dmsToDecimal(latArr, latRef);
        const lon = dmsToDecimal(lonArr, lonRef);

        if (lat === null || lon === null || isNaN(lat) || isNaN(lon) ||
            Math.abs(lat) > 90 || Math.abs(lon) > 180) {
            return '⚠️ GPS data found but could not be converted';
        }

        const coordStr  = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        const mapsLink  = `https://www.google.com/maps?q=${lat},${lon}`;

        // Show coords immediately, then resolve address
        resGps.innerHTML = `${coordStr}\n<a class="gps-link" href="${mapsLink}" target="_blank">🗺 Open in Maps</a>\n⏳ Resolving address...`;

        const address = await reverseGeocode(lat, lon);
        const addrLine = address
            ? `📍 ${address}`
            : '📍 Address lookup failed';

        return `${coordStr}\n${addrLine}\n<a class="gps-link" href="${mapsLink}" target="_blank">🗺 Open in Maps</a>`;
    }

    // ─── Export ────────────────────────────────────────────────────────────────
    exportBtn.addEventListener('click', () => {
        const reportContent = `
IMAGE FORENSICS REPORT
----------------------
Generated: ${new Date().toLocaleString()}

🛠️ SOFTWARE DETECTED: ${resSoftware.innerText}
📷 CAMERA/DEVICE:     ${resCamera.innerText}
⏰ DATE TAKEN:        ${resDate.innerText}
📍 GPS LOCATION:      ${resGps.innerText}

----------------------
RAW METADATA:
${rawJson.textContent}
        `.trim();

        const blob = new Blob([reportContent], { type: 'text/plain' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `forensics_report_${Date.now()}.txt`;
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        document.body.removeChild(a);
    });

}); // end DOMContentLoaded
</script>
</body>
</html>
